name: SpiceVault
options:
  bundleIdPrefix: com.shimondeitel.spicevault
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SpiceVault:
    type: application
    platform: iOS
    sources:
      - path: SpiceVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spicevault
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SpiceVault/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SpiceVaultTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SpiceVaultTests
      - path: SpiceVault.storekit
    dependencies:
      - target: SpiceVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spicevault.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SpiceVaultUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SpiceVaultUITests
    dependencies:
      - target: SpiceVault
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spicevault.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SpiceVault:
    build:
      targets:
        SpiceVault: all
        SpiceVaultTests: [test]
        SpiceVaultUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SpiceVault.storekit
    test:
      config: Debug
      storeKitConfiguration: SpiceVault.storekit
      targets:
        - SpiceVaultTests
        - SpiceVaultUITests
    archive:
      config: Release
